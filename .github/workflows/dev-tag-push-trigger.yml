name: Dev Tag Push Trigger

on:
  push:
    tags:
      - "dev-*"

permissions:
  contents: read
  actions: write

jobs:
  validate_and_run:
    runs-on: ubuntu-latest

    steps:
      - name: Extract tag name
        id: extract
        run: |
          echo "🔍 Extracting tag name..."
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Extracted tag: $TAG_NAME"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Validate tag format
        id: validate
        run: |
          TAG_NAME=${{ steps.extract.outputs.tag_name }}
          echo "🧩 Validating tag format: $TAG_NAME"
          if [[ "$TAG_NAME" =~ ^dev-[0-9]{10}$ ]]; then
            echo "✅ Valid tag format: $TAG_NAME"
          else
            echo "❌ Invalid tag format: $TAG_NAME"
            echo "Expected format: dev-YYYYMMDDHH"
            exit 1
          fi

      - name: Trigger Tuist build workflow
        if: success()
        uses: peter-evans/workflow-dispatch@v3
        with:
          workflow: "tuist-build.yml"
          ref: ${{ github.ref }}
          inputs:
            tag_name: ${{ steps.extract.outputs.tag_name }}
