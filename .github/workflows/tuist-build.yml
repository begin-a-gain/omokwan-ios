name: Project Build (Tuist)

on:
  workflow_dispatch:

env:
  XCODE_VERSION: "16.3"
  PLATFORM: "iOS"
  SDK: "iphoneos"
  TUIST_VERSION: "4.40.0"

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Xcode version
        run: |
          echo "🧰 Checking Xcode environment..."
          xcodebuild -version
          echo "✅ Xcode environment check complete."

      - name: Install Tuist via mise
        run: |
          echo "⚙️ Installing mise and setting up Tuist version ${{ env.TUIST_VERSION }}..."
          curl https://mise.run | sh
          mise use tuist@${{ env.TUIST_VERSION }}
          tuist version
          echo "✅ Tuist installation complete."

      - name: Tuist setup
        run: |
          echo "📦 Running Tuist setup (fetch & generate)..."
          tuist fetch && echo "✅ Tuist fetch success." || { echo "❌ Tuist fetch failed."; exit 1; }
          tuist generate && echo "✅ Tuist generate success." || { echo "❌ Tuist generate failed."; exit 1; }

      - name: Build Xcode project
        run: |
          echo "🏗️ Starting Xcode build 
          set -o pipefail
          xcodebuild \
            -project YourApp.xcodeproj \
            -scheme YourApp \
            -sdk ${{ env.SDK }} \
            -configuration Release \
            build | xcpretty

          if [ $? -eq 0 ]; then
            echo "✅ Xcode build completed successfully
          else
            echo "❌ Xcode build failed 
            exit 1
          fi

      - name: Build success
        if: success()
        run: echo "🚀 Tuist build completed successfully!"
